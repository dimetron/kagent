name: Scan images

on:
  # Trigger once a week on the main branch
  schedule:
  - cron: '0 0 * * 0' # Every Monday at midnight UTC

  # Trigger the workflow on push to the main branch
  push:
    branches: [ main ]

  workflow_dispatch:

env:
  # Cache key components for better organization
  CACHE_KEY_PREFIX: kagent-v2
  # Consistent builder configuration
  BUILDX_BUILDER_NAME: kagent-builder-v0.23.0
  BUILDX_VERSION: v0.23.0

jobs:
  build:
    strategy:
      matrix:
        image:
          - controller
          - ui
          - app
          - tools 
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          name: ${{ env.BUILDX_BUILDER_NAME }}
          version: ${{ env.BUILDX_VERSION }}
          platforms: linux/amd64,linux/arm64
          buildkitd-config: scripts/buildx/buildkitd.toml
          use: 'true'
          driver: docker-container
          driver-opts: |
            image=moby/buildkit:${{ env.BUILDX_VERSION }}
            network=host
          buildkitd-flags: --debug
      - name: Set version
        id: vars
        run: echo "version=v0.0.0-$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
      - name: Print version
        run: | 
          echo "Version: ${{ steps.vars.outputs.version }}"
      - name: Run make build
        env:
          DOCKER_BUILDER: "docker buildx"
          DOCKER_BUILD_ARGS: >-
            --load
            --platform=linux/amd64
            --cache-from=type=gha,scope=${{ env.CACHE_KEY_PREFIX }}-main-${{ matrix.image }}
            --cache-to=type=gha,scope=${{ env.CACHE_KEY_PREFIX }}-main-${{ matrix.image }},mode=max
            --build-arg=VERSION=${{ steps.vars.outputs.version }}
        run: |
          # if workflow_dispatch is used, use the version input
          if [ -n "${{ github.event.inputs.version }}" ]; then
            export VERSION=${{ github.event.inputs.version }}
          else
            export VERSION=${{ steps.vars.outputs.version }}
          fi
          make build-${{ matrix.image }}
        working-directory: ./
      - name: Load image versions
        id: image-versions
        run: make build-img-versions
      - name: Image vulnerability scanner
        uses: aquasecurity/trivy-action@0.30.0
        with:
          image-ref: ghcr.io/kagent-dev/kagent/${{ matrix.image }}:${{ steps.vars.outputs.version }}
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
