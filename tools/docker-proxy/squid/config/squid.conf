# squid.conf optimized for caching Alpine APK packages with parent proxy genproxy:8080

# Define the port for the proxy to listen on
http_port 3128
visible_hostname http-proxy

# Configure parent proxy
cache_peer 10.232.233.70 parent 8080 0 no-query default

# ACL for docker registry to access directly
acl docker_registry dstdomain docker-registry-proxy.corp.amdocs.com
# Allow direct access to docker registry
always_direct allow docker_registry
# For all other traffic, never go direct
never_direct allow all
prefer_direct off

acl localnet src 10.0.0.0/8		# RFC1918 possible internal network
acl localnet src 172.16.0.0/12		# RFC1918 possible internal network
acl localnet src 172.18.0.0/12
acl localnet src 192.168.0.0/16		# RFC1918 possible internal network
acl localnet src fc00::/7           # RFC 4193 local private network range
acl localnet src fe80::/10          # RFC 4291 link-local (directly plugged) machines

acl SSL_ports port 443
acl SSL_ports port 8080
acl Safe_ports port 80		# http
acl Safe_ports port 8080    # http
acl Safe_ports port 443		# https
acl CONNECT method CONNECT

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

http_access allow localhost manager
http_access deny manager

http_access allow localnet
http_access allow localhost
http_access deny all

# Enable disk caching
cache_dir ufs /var/spool/squid 5000 16 256
maximum_object_size 200 MB

# Configure access logging
access_log /var/log/squid/access.log squid
cache_log /var/log/squid/cache.log
logformat combined %>a %ui %un [%tl] "%rm %ru HTTP/%rv" %Hs %<st "%{Referer}>h" "%{User-Agent}>h" %Ss:%Sh
access_log /var/log/squid/access_detailed.log combined
# Set debug level (0-9, higher means more verbose)
debug_options ALL,1
debug_options CONNECT,2
debug_options ICAP,2

# Specific caching for APK packages
refresh_pattern ^http://dl-cdn\.alpinelinux\.org/.*\.apk$  1440 50% 10080 ignore-no-cache
refresh_pattern ^https://dl-cdn\.alpinelinux\.org/.*\.apk$  1440 50% 10080 ignore-no-cache
refresh_pattern ^http://mirrors\.alpinelinux\.org/.*\.apk$ 1440 50% 10080 ignore-no-cache
refresh_pattern ^https://mirrors\.alpinelinux\.org/.*\.apk$ 1440 50% 10080 ignore-no-cache
refresh_pattern ^http://packages\.wolfi\.dev/.*\.apk$      1440 50% 10080 ignore-no-cache
refresh_pattern ^https://packages\.wolfi\.dev/.*\.apk$      1440 50% 10080 ignore-no-cache
# NPM registry caching
refresh_pattern -i \.npm 1440 20% 10080 ignore-no-cache
refresh_pattern -i registry\.npmjs\.org 1440 20% 10080 ignore-no-cache
refresh_pattern -i registry\.yarnpkg\.com 1440 20% 10080 ignore-no-cache

# Default refresh patterns
refresh_pattern ^ftp:		1440	20%	10080
refresh_pattern ^gopher:	1440	0%	1440
refresh_pattern -i (/cgi-bin/|\?) 0	0%	0
refresh_pattern .		0	20%	4320