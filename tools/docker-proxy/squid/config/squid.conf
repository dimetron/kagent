# squid.conf optimized for caching Alpine APK packages with parent proxy genproxy:8080

# Define the port for the proxy to listen on
http_port  3128

visible_hostname http-proxy

# Configure parent proxies with fastest selection and caching enabled
cache_peer 10.232.233.70 parent 8080 0 no-query default name=genproxy allow-miss
#cache_peer 192.168.8.1   parent 3128 0 no-query default name=genproxy allow-miss

# ACL for docker registry to access directly
acl docker_registry dstdomain docker-registry-proxy.corp.amdocs.com

# ACL for Alpine Linux and other package repositories
acl go_packages     dstdomain proxy.golang.org sigs.k8s.io
acl wolfi_linux     dstdomain packages.wolfi.dev apk.cgr.dev .cloudflarestorage.com
acl alpine_linux    dstdomain dl-cdn.alpinelinux.org mirrors.alpinelinux.org
acl python_packages dstdomain bun.sh pypi.org pypi.python.org files.pythonhosted.org
acl npm_registries  dstdomain registry.npmjs.org registry.yarnpkg.com bun.sh fonts.googleapis.com fonts.gstatic.com
acl github_releases dstdomain github.com release-assets.githubusercontent.com objects.githubusercontent.com raw.githubusercontent.com get.helm.sh dl.k8s.io cdn.dl.k8s.io istio.io

# Allow direct access to docker registry
always_direct allow docker_registry
always_direct allow go_packages

# Configure parent proxy for package repositories - allow all for caching
cache_peer_access genproxy allow all

# Ensure Alpine Linux repositories use the parent proxy (not direct)
# always_direct allow alpine_linux

# For all other traffic, prefer cache then parent proxy
# This allows serving from cache even when parent is unavailable
prefer_direct off
hierarchy_stoplist cgi-bin ?
cache_mem 256 MB
maximum_object_size_in_memory 64 KB

acl localnet src 10.0.0.0/8		# RFC1918 possible internal network
acl localnet src 172.16.0.0/12		# RFC1918 possible internal network
acl localnet src 172.18.0.0/12
acl localnet src 192.168.0.0/16		# RFC1918 possible internal network
acl localnet src fc00::/7           # RFC 4193 local private network range
acl localnet src fe80::/10          # RFC 4291 link-local (directly plugged) machines

acl SSL_ports port 443
acl SSL_ports port 8080
acl Safe_ports port 80		# http
acl Safe_ports port 8080    # http
acl Safe_ports port 443		# https
acl Safe_ports port 4873	# https
acl CONNECT method CONNECT

http_access deny !Safe_ports
http_access deny CONNECT !SSL_ports

# Allow CONNECT to package repositories on standard HTTPS port
http_access allow CONNECT go_packages
http_access allow CONNECT python_packages
http_access allow CONNECT alpine_linux
http_access allow CONNECT wolfi_linux
http_access allow CONNECT npm_registries
http_access allow CONNECT github_releases


http_access allow localhost manager
http_access deny manager

http_access allow localnet
http_access allow localhost
http_access deny all

# Enable disk caching with larger size for offline operation
cache_dir ufs /var/spool/squid 10000 16 256
maximum_object_size 500 MB
minimum_object_size 0 KB
cache_replacement_policy heap LFUDA
memory_replacement_policy heap GDSF

# Configure access logging
access_log /var/log/squid/access.log squid
cache_log /var/log/squid/cache.log
logformat combined %>a %ui %un [%tl] "%rm %ru HTTP/%rv" %Hs %<st "%{Referer}>h" "%{User-Agent}>h" %Ss:%Sh
access_log /var/log/squid/access_detailed.log combined

# Set debug level (0-9, higher means more verbose)
debug_options ALL,1
debug_options CONNECT,2
debug_options ICAP,2

# Specific caching for APK packages
refresh_pattern ^http://dl-cdn\.alpinelinux\.org/.*\.apk$                   1440 50% 10080  override-expire ignore-no-cache ignore-no-store ignore-private
refresh_pattern ^https://dl-cdn\.alpinelinux\.org/.*\.apk$                  1440 50% 10080  override-expire ignore-no-cache ignore-no-store ignore-private
refresh_pattern ^http://mirrors\.alpinelinux\.org/.*\.apk$                  1440 50% 10080  override-expire ignore-no-cache ignore-no-store ignore-private
refresh_pattern ^https://mirrors\.alpinelinux\.org/.*\.apk$                 1440 50% 10080  override-expire ignore-no-cache ignore-no-store ignore-private
refresh_pattern ^http://packages\.wolfi\.dev/.*\.apk$                       1440 50% 10080  override-expire ignore-no-cache ignore-no-store ignore-private
refresh_pattern ^http://release-assets\.githubusercontent\.com/.*\.apk$     1440 50% 10080  override-expire ignore-no-cache ignore-no-store ignore-private
refresh_pattern ^http://objects\.githubusercontent\.com/.*\.apk$            1440 50% 10080  override-expire ignore-no-cache ignore-no-store ignore-private

# NPM registry caching
refresh_pattern -i \.npm 1440 20% 10080 ignore-no-cache
refresh_pattern -i registry\.npmjs\.org 1440 50% 10080 ignore-no-cache
refresh_pattern -i registry\.yarnpkg\.com 1440 50% 10080 ignore-no-cache
refresh_pattern -i bun\.sh 1440 50% 10080 ignore-no-cache

# Enhanced caching patterns for offline operation
refresh_pattern -i \.(deb|rpm|zip|tar|tgz|ram|rar|bin|ppt|doc|tiff) 10080 99999% 432000 override-expire ignore-no-cache ignore-no-store ignore-private
refresh_pattern (Release|Packages(.gz)*)$      0       20%     2880

# Go modules and dependencies
refresh_pattern -i proxy\.golang\.org 1440 50% 10080 override-expire ignore-no-cache ignore-no-store
refresh_pattern -i sum\.golang\.org 1440 50% 10080 override-expire ignore-no-cache ignore-no-store
refresh_pattern -i goproxy\.io 1440 50% 10080 override-expire ignore-no-cache ignore-no-store

# Python packages
refresh_pattern -i files\.pythonhosted\.org 1440 50% 10080 override-expire ignore-no-cache ignore-no-store
refresh_pattern -i pypi\.org 1440 50% 10080 override-expire ignore-no-cache ignore-no-store

# GitHub releases and assets
refresh_pattern -i github\.com.*/(releases|archive)/ 1440 50% 10080 override-expire ignore-no-cache ignore-no-store
refresh_pattern -i release-assets\.githubusercontent\.com 1440 50% 10080 override-expire ignore-no-cache ignore-no-store
refresh_pattern -i objects\.githubusercontent\.com 1440 50% 10080 override-expire ignore-no-cache ignore-no-store

# Docker registry
refresh_pattern -i docker-registry-proxy\.corp\.amdocs\.com 1440 50% 10080 override-expire ignore-no-cache ignore-no-store

# Default refresh patterns
refresh_pattern ^ftp:		1440	20%	10080
refresh_pattern ^gopher:	1440	0%	1440
refresh_pattern -i (/cgi-bin/|\?) 0	0%	0
refresh_pattern .		1440	50%	10080 override-expire

retry_on_error on
buffered_logs on