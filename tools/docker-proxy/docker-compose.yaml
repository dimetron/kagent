version: '3.1'

services:
  npm-proxy:
    image: docker-registry-proxy.corp.amdocs.com/verdaccio/verdaccio
    container_name: 'npm-proxy'
    hostname: 'npm-proxy'
    restart: always
    network_mode: host
    depends_on:
      - http-proxy
    environment:
      - VERDACCIO_PORT=4873
      - VERDACCIO_LOG_LEVEL=info
      - HTTP_PROXY=http://127.0.0.1:3128
      - HTTPS_PROXY=http://127.0.0.1:3128
    ports:
      - '4873:4873'
    volumes:
      - './verdaccio/storage:/verdaccio/storage'
      - './verdaccio/config:/verdaccio/conf'
      - './verdaccio/plugins:/verdaccio/plugins'
      - './verdaccio/logs:/verdaccio/logs'
  http-proxy:
    image: docker-registry-proxy.corp.amdocs.com/ubuntu/squid
    container_name: 'http-proxy'
    hostname: 'http-proxy'
    restart: always
    network_mode: host
    environment:
      - SQUID_PORT=3128
      - SQUID_LOG_LEVEL=info
    ports:
      - '3128:3128'
    volumes:
      - './squid/cache:/var/spool/squid'
      - './squid/config:/etc/squid'
      - './squid/logs:/var/log/squid'
