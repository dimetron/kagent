apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kagent.fullname" . }}-ms360-armo-role
  labels:
    {{- include "kagent.labels" . | nindent 4 }}
rules:
- apiGroups:
    - ''
  resources:
    - namespaces
    - services
    - endpoints
    - pods
    - persistentvolumeclaims
  verbs:
    - "*"
- apiGroups:
    - apps
  resources:
    - deployments
    - daemonsets
    - replicasets
    - statefulsets
  verbs:
    - "*"
- apiGroups:
    - policy
  resources:
    - poddisruptionbudgets
  verbs:
    - "*"
- apiGroups:
    - autoscaling
  resources:
    - horizontalpodautoscalers
  verbs:
    - "*"
- apiGroups:
    - networking.k8s.io
  resources:
    - networkpolicies
    - ingresses
  verbs:
    - "*"
- apiGroups:
    - rbac.authorization.k8s.io
  resources:
    - clusterroles
    - clusterrolebindings
    - roles
    - rolebindings
  verbs:
    - "*"
- apiGroups:
    - apiextensions.k8s.io
  resources:
    - customresourcedefinitions
  verbs:
    - "*"
- apiGroups:
    - authentication.k8s.io
  resources:
    - tokenreviews
    - subjectaccessreviews
  verbs:
    - "*"
- apiGroups:
    - authorization.k8s.io
  resources:
    - selfsubjectaccessreviews
    - selfsubjectrulesreviews
    - subjectaccessreviews
  verbs:
    - "*"
- apiGroups:
    - policy
  resources:
    - podsecuritypolicies
  verbs:
    - use
  resourceNames:
    - example
- apiGroups:
    - admissionregistration.k8s.io
  resources:
    - validatingwebhookconfigurations
    - mutatingwebhookconfigurations
  verbs:
    - "*"
- apiGroups:
    - ''
  resources:
    - secrets
    - configmaps
    - serviceaccounts
  verbs:
    - "*"
- apiGroups:
    - networking.ms360-armo.io
    - security.ms360-armo.io
    - telemetry.ms360-armo.io
    - extensions.ms360-armo.io
    - install.ms360-armo.io
    - gateway.networking.k8s.io
  resources:
    - "*"
  verbs:
    - "*"
- apiGroups:
    - ''
  resources:
    - pods/portforward
  verbs:
    - create
- apiGroups:
    - app.amdocs.com
  verbs:
    - get
    - list
  resources:
  - amdocsresourcemonitors
  - amdocsresourcemonitors/finalizers
  - amdocsresourcemonitors/status
  - configbindings
  - customresourcebindings
  - microservices
  - resourcerequests
  - amdocsservicemeshbindings
  - amdocsservicemeshbindings/finalizers
  - amdocsservicemeshbindings/status
  - amdocsexternalmeshbindings
  - amdocsexternalmeshbindings/finalizers
  - amdocsexternalmeshbindings/status
  - amdocstrafficroutings
  - amdocstrafficroutings/finalizers
  - amdocstrafficroutings/status
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kagent.fullname" . }}-ms360-armo-rolebinding
  labels:
    {{- include "kagent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kagent.fullname" . }}-ms360-armo-role
subjects:
  - kind: ServiceAccount
    name: {{ include "kagent.fullname" . }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: kagent.dev/v1alpha1
kind: Agent
metadata:
  name: ms360-security-agent
  labels:
    {{- include "kagent.labels" . | nindent 4 }}
spec:
  description: An ms360-armo Expert AI Agent specializing in ms360-armo operations,
    troubleshooting, and maintenance.
  systemMessage: |-
    |-
    You're a friendly and helpful agent that uses `GetResources` tool to check `armo` kubernetes resource
    and then check status of the resources and explain the issues.

  modelConfig: {{ .Values.modelConfigRef | default (printf "%s" (include "kagent.defaultModelConfigName" .)) }}
  tools:
    - type: Builtin
      builtin:
        name: kagent.tools.k8s.DescribeResource
    - type: Builtin
      builtin:
        name: kagent.tools.k8s.GetResources