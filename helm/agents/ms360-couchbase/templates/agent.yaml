---
apiVersion: kagent.dev/v1alpha1
kind: ToolServer
metadata:
  name: ms360-couchbase-toolserver
  namespace: kagent
spec:
  description: provides a tool server for the MilCy impact agent
  config:
    sse:
      # add namespace from the release to the URL if needed
      url: http://mcp-kagent.ilcepoc3420.k8s.cloudnative.corp.amdocs.com/sse
      timeout: 50s
      sse_read_timeout: 50s
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kagent.fullname" . }}-ms360-couchbase-role
  labels:
    {{- include "kagent.labels" . | nindent 4 }}
rules:
- apiGroups:
    - ''
  resources:
    - namespaces
    - services
    - endpoints
    - pods
    - persistentvolumeclaims
  verbs:
    - "*"
- apiGroups:
    - apps
  resources:
    - deployments
    - daemonsets
    - replicasets
    - statefulsets
  verbs:
    - "*"
- apiGroups:
    - policy
  resources:
    - poddisruptionbudgets
  verbs:
    - "*"
- apiGroups:
    - autoscaling
  resources:
    - horizontalpodautoscalers
  verbs:
    - "*"
- apiGroups:
    - networking.k8s.io
  resources:
    - networkpolicies
    - ingresses
  verbs:
    - "*"
- apiGroups:
    - rbac.authorization.k8s.io
  resources:
    - clusterroles
    - clusterrolebindings
    - roles
    - rolebindings
  verbs:
    - "*"
- apiGroups:
    - apiextensions.k8s.io
  resources:
    - customresourcedefinitions
  verbs:
    - "*"
- apiGroups:
    - authentication.k8s.io
  resources:
    - tokenreviews
    - subjectaccessreviews
  verbs:
    - "*"
- apiGroups:
    - authorization.k8s.io
  resources:
    - selfsubjectaccessreviews
    - selfsubjectrulesreviews
    - subjectaccessreviews
  verbs:
    - "*"
- apiGroups:
    - policy
  resources:
    - podsecuritypolicies
  verbs:
    - use
  resourceNames:
    - example
- apiGroups:
    - admissionregistration.k8s.io
  resources:
    - validatingwebhookconfigurations
    - mutatingwebhookconfigurations
  verbs:
    - "*"
- apiGroups:
    - ''
  resources:
    - secrets
    - configmaps
    - serviceaccounts
  verbs:
    - "*"
- apiGroups:
    - networking.ms360-couchbase.io
    - security.ms360-couchbase.io
    - telemetry.ms360-couchbase.io
    - extensions.ms360-couchbase.io
    - install.ms360-couchbase.io
    - gateway.networking.k8s.io
  resources:
    - "*"
  verbs:
    - "*"
- apiGroups:
    - app.amdocs.com
  verbs:
    - get
    - list
  resources:
  - amdocsresourcemonitors
  - amdocsresourcemonitors/finalizers
  - amdocsresourcemonitors/status
  - configbindings
  - customresourcebindings
  - microservices
  - resourcerequests
  - amdocsservicemeshbindings
  - amdocsservicemeshbindings/finalizers
  - amdocsservicemeshbindings/status
  - amdocsexternalmeshbindings
  - amdocsexternalmeshbindings/finalizers
  - amdocsexternalmeshbindings/status
  - amdocstrafficroutings
  - amdocstrafficroutings/finalizers
  - amdocstrafficroutings/status
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kagent.fullname" . }}-ms360-couchbase-rolebinding
  labels:
    {{- include "kagent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kagent.fullname" . }}-ms360-couchbase-role
subjects:
  - kind: ServiceAccount
    name: {{ include "kagent.fullname" . }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: kagent.dev/v1alpha1
kind: Agent
metadata:
  name: ms360-couchbase-agent
  labels:
    {{- include "kagent.labels" . | nindent 4 }}
spec:
  description: An ms360-couchbase Expert AI Agent specializing in ms360-couchbase operations,
    troubleshooting, and maintenance.
  systemMessage: |-
    You're a friendly and helpful agent that uses `GetResources` tool to check `couchbase` kubernetes resource
    and then check status of the resources and explain the issues.

    Couchbase Tools:
    - `get_document_by_id` - Retrieves a document by its ID from a specified collection in a Couchbase bucket.
    - `get_schema_for_collection` - Retrieves the schema for a specified collection in a Couchbase bucket.
    - `get_scopes_and_collections_in_bucketupsert_document_by_id` - Retrieves the scopes and collections in a specified Couchbase bucket.
    - `run_sql_plus_plus_query` - Executes a SQL++ query against a specified Couchbase bucket.
    - `upsert_document_by_id` - Inserts or updates a document by its ID in a specified collection in a Couchbase bucket.


  modelConfig: {{ .Values.modelConfigRef | default (printf "%s" (include "kagent.defaultModelConfigName" .)) }}
  tools:
    - type: Builtin
      builtin:
        name: kagent.tools.k8s.DescribeResource
    - type: Builtin
      builtin:
        name: kagent.tools.k8s.GetResources
    - type: McpServer
      mcpServer:
        toolServer: ms360-couchbase-toolserver
        toolNames:
        - get_document_by_id
        - get_schema_for_collection
        - get_scopes_and_collections_in_bucket
        - run_sql_plus_plus_query
        - upsert_document_by_id