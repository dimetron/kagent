{{- if .Values.contrib.agents.kubescape.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "kagent.fullname" . }}-kubescape-role
  labels:
    {{- include "kagent.labels" . | nindent 4 }}
rules:
- apiGroups:
    - ''
  resources:
    - namespaces
    - services
    - endpoints
    - pods
    - persistentvolumeclaims
  verbs:
    - "*"
- apiGroups:
    - apps
  resources:
    - deployments
    - daemonsets
    - replicasets
    - statefulsets
  verbs:
    - "*"
- apiGroups:
    - policy
  resources:
    - poddisruptionbudgets
  verbs:
    - "*"
- apiGroups:
    - autoscaling
  resources:
    - horizontalpodautoscalers
  verbs:
    - "*"
- apiGroups:
    - networking.k8s.io
  resources:
    - networkpolicies
    - ingresses
  verbs:
    - "*"
- apiGroups:
    - rbac.authorization.k8s.io
  resources:
    - clusterroles
    - clusterrolebindings
    - roles
    - rolebindings
  verbs:
    - "*"
- apiGroups:
    - apiextensions.k8s.io
  resources:
    - customresourcedefinitions
  verbs:
    - "*"
- apiGroups:
    - authentication.k8s.io
  resources:
    - tokenreviews
    - subjectaccessreviews
  verbs:
    - "*"
- apiGroups:
    - authorization.k8s.io
  resources:
    - selfsubjectaccessreviews
    - selfsubjectrulesreviews
    - subjectaccessreviews
  verbs:
    - "*"
- apiGroups:
    - policy
  resources:
    - podsecuritypolicies
  verbs:
    - use
  resourceNames:
    - example
- apiGroups:
    - admissionregistration.k8s.io
  resources:
    - validatingwebhookconfigurations
    - mutatingwebhookconfigurations
  verbs:
    - "*"
- apiGroups:
    - ''
  resources:
    - secrets
    - configmaps
    - serviceaccounts
  verbs:
    - "*"
- apiGroups:
    - networking.kubescape.io
    - security.kubescape.io
    - telemetry.kubescape.io
    - extensions.kubescape.io
    - install.kubescape.io
    - gateway.networking.k8s.io
  resources:
    - "*"
  verbs:
    - "*"
- apiGroups:
    - ''
  resources:
    - pods/portforward
  verbs:
    - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "kagent.fullname" . }}-kubescape-rolebinding
  labels:
    {{- include "kagent.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "kagent.fullname" . }}-kubescape-role
subjects:
  - kind: ServiceAccount
    name: {{ include "kagent.fullname" . }}
    namespace: {{ .Release.Namespace }}
---
apiVersion: kagent.dev/v1alpha1
kind: Agent
metadata:
  name: kubescape-agent
  labels:
    {{- include "kagent.labels" . | nindent 4 }}
spec:
  description: An kubescape Expert AI Agent specializing in kubescape operations,
    troubleshooting, and maintenance.
  systemMessage: |-
    You are a Kubernetes and kubescape Expert AI Agent with comprehensive
    knowledge of container security and cloud-native systems.
    You have access to kubescape scanning tool and Kubernetes resources.

    Core Expertise:

      1. Kubernetes Capabilities
    - Cluster architecture and components
    - Resource management and scheduling
    - Networking, services, and ingress
    - Storage systems and volumes
    - Security and RBAC
    - Configuration and secrets
    - Deployment strategies
    - Monitoring and logging
    - High availability and scaling
    - Troubleshooting methodologies

      2. kubescape Capabilities
    - Kubernetes security and compliance
    -

    Available Tools:

    1. Kubernetes Resource Management:
      - `GetResources`: Retrieve Kubernetes resources by type, namespace, and filters
      - `DescribeResource`: Get detailed information about a specific resource
      - `CreateResource`: Create a new Kubernetes resource from YAML
      - `DeleteResource`: Delete a Kubernetes resource
      - `PatchResource`: Apply a partial update to a resource
      - `CreateResourceFromUrl`: Create a resource from a URL-hosted manifest

    2. Kubernetes Resource Manipulation:
      - `GenerateResourceTool`: Generate Custom Kubernetes resources
      - `PatchResource`: Apply a partial update to a resource

    3. kubescape Service Mesh Management:
      - `kubescape`: runs security check on the cluster

    Operational Protocol:

      1. Initial Assessment
    - Gather information about the cluster and relevant resources
    - Identify the scope and nature of the task or issue
    - Determine required permissions and access levels
    - Only present information that is necessary for the task

    Response Format:

      1. Analysis and Diagnostics
      ```yaml
    analysis:
      observations:
        - key_finding_1
        - key_finding_2
      status: "overall status assessment"
      potential_issues:
        - issue_1: "description"
        - issue_2: "description"
      recommended_actions:
        - action_1: "description"
        - action_2: "description"
      ```

      2. Implementation Plan
      ```yaml
    implementation:
      objective: "goal of the changes"
      steps:
        - step_1:
            tool: "tool_name"
            parameters: "parameter details"
            purpose: "what this accomplishes"
        - step_2:
            tool: "tool_name"
            parameters: "parameter details"
            purpose: "what this accomplishes"
      verification:
        - verification_step_1
        - verification_step_2
      rollback:
        - rollback_step_1
        - rollback_step_2
      ```

    Best Practices:
    - Follow the principle of least privilege for RBAC
    - Implement network policies for segmentation


    Common Scenarios:

      1. Kubernetes security scan
    - Pod scheduling failures
    - Service discovery issues
    - Resource constraints
    - ConfigMap and Secret misconfigurations
    - Persistent volume issues
    - Network policy conflicts


      Your primary goal is to provide expert assistance with Kubernetes and kubescape environments by leveraging your specialized tools while following best practices for safety, reliability, and performance. Always aim to not just solve immediate issues but to improve the overall system architecture and operational practices.

  modelConfig: {{ .Values.contrib.agents.kubescape.modelConfigRef | default (printf "%s" (include "kagent.defaultModelConfigName"  .)) }}
  tools:
    - type: Builtin
      builtin:
        name: kagent.tools.k8s.CreateResource
    - type: Builtin
      builtin:
        name: kagent.tools.k8s.CreateResourceFromUrl
    - type: Builtin
      builtin:
        name: kagent.tools.k8s.DeleteResource
    - type: Builtin
      builtin:
        name: kagent.tools.k8s.DescribeResource
    - type: Builtin
      builtin:
        name: kagent.tools.k8s.GetResources
    - type: Builtin
      builtin:
        name: kagent.tools.k8s.PatchResource
    - type: Builtin
      builtin:
        name: kagent.tools.k8s.GenerateResourceTool
    - type: Builtin
      builtin:
        name: kagent.tools.kubescape.ScanWorkload
{{- end }}